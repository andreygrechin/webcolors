---
# When a version tag (v*.*.*) is pushed — either manually by a developer or
# by the dependabot-auto-release workflow — this job makes sure that
# src/webcolors/__init__.py on the main branch carries the matching version.
#
# If __init__.py already matches (e.g. the tag was created by the automated
# dependabot flow which bumps first), the job is a no-op.
#
# NOTE: Branch protection must allow "github-actions[bot]" to push directly
# to main, otherwise the version-sync commit will be rejected.
name: sync-version-on-tag

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  sync-version:
    name: Sync __init__.py with tag on main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Update __init__.py to match tag
        id: sync
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION_FILE="src/webcolors/__init__.py"
          CURRENT=$(sed -n 's/^__version__ = "\(v[0-9]*\.[0-9]*\.[0-9]*\)"/\1/p' "$VERSION_FILE")

          if [ -z "$CURRENT" ]; then
            echo "::error::Failed to extract version from $VERSION_FILE"
            exit 1
          fi

          if [ "$CURRENT" = "$TAG" ]; then
            echo "Version already matches tag ($TAG). Nothing to do."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Updating version from $CURRENT to $TAG"
            sed -i "s/__version__ = \"${CURRENT}\"/__version__ = \"${TAG}\"/" "$VERSION_FILE"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push to main
        if: steps.sync.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/webcolors/__init__.py
          git commit -m "chore: sync version to ${GITHUB_REF_NAME}"
          git push origin main
