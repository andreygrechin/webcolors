---
# Automatically bump the patch version, tag, and trigger a container publish
# when a Dependabot **security** PR is merged to main.
#
# Non-security Dependabot updates are still auto-merged (by the auto-merge
# workflow) but do NOT get a version bump or a new release.
#
# NOTE: Branch protection must allow "github-actions[bot]" to push directly
# to main, otherwise the version-bump commit and tag push will be rejected.
name: dependabot-auto-release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: read

jobs:
  auto-release:
    name: Bump version, tag, and trigger publish for Dependabot security merges
    runs-on: ubuntu-latest
    steps:
      - name: Detect Dependabot merge
        id: detect
        run: |
          AUTHOR="${{ github.event.head_commit.author.username }}"
          if [ "$AUTHOR" = "dependabot[bot]" ]; then
            echo "is_dependabot=true" >> "$GITHUB_OUTPUT"
          else
            echo "Commit author is '$AUTHOR', not dependabot. Skipping."
            echo "is_dependabot=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for security label on merged PR
        if: steps.detect.outputs.is_dependabot == 'true'
        id: security
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMIT_SHA="${{ github.event.head_commit.id }}"
          PR_NUMBER=$(gh api "/repos/${{ github.repository }}/commits/${COMMIT_SHA}/pulls" \
            --jq '.[0].number' 2>/dev/null || echo "")

          if [ -z "$PR_NUMBER" ]; then
            echo "::warning::Could not find PR associated with commit ${COMMIT_SHA}. Skipping."
            echo "is_security=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LABELS=$(gh pr view "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --json labels --jq '.labels[].name' 2>/dev/null || echo "")

          if echo "$LABELS" | grep -q "^security$"; then
            echo "Security label found on PR #${PR_NUMBER}. Will bump version."
            echo "is_security=true" >> "$GITHUB_OUTPUT"
          else
            echo "No security label on PR #${PR_NUMBER}. Skipping version bump."
            echo "is_security=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.detect.outputs.is_dependabot == 'true' && steps.security.outputs.is_security == 'true'
        uses: actions/checkout@v6

      - name: Bump patch version, commit, tag, and push
        if: steps.detect.outputs.is_dependabot == 'true' && steps.security.outputs.is_security == 'true'
        run: |
          VERSION_FILE="src/webcolors/__init__.py"
          CURRENT=$(sed -n 's/^__version__ = "\(v[0-9]*\.[0-9]*\.[0-9]*\)"/\1/p' "$VERSION_FILE")
          if [ -z "$CURRENT" ]; then
            echo "::error::Failed to extract version from $VERSION_FILE"
            exit 1
          fi

          VERSION_BODY="${CURRENT#v}"
          MAJOR="${VERSION_BODY%%.*}"
          REST="${VERSION_BODY#*.}"
          MINOR="${REST%%.*}"
          PATCH="${REST#*.}"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="v${MAJOR}.${MINOR}.${NEW_PATCH}"

          sed -i "s/__version__ = \"${CURRENT}\"/__version__ = \"${NEW_VERSION}\"/" "$VERSION_FILE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$VERSION_FILE"
          git commit -m "chore: bump version to ${NEW_VERSION}"
          git tag "$NEW_VERSION"
          git push origin main "$NEW_VERSION"
